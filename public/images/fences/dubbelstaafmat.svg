<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#6d4c41"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#546e7a"/>
      <stop offset="50%" stop-color="#455a64"/>
      <stop offset="100%" stop-color="#37474f"/>
    </linearGradient>
    <linearGradient id="post" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#455a64"/>
      <stop offset="50%" stop-color="#546e7a"/>
      <stop offset="100%" stop-color="#455a64"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="240" width="400" height="60" fill="url(#ground)" rx="0"/>
  <rect x="0" y="238" width="400" height="6" fill="#a5d6a7" rx="2"/>
  <!-- Grass blades -->
  <path d="M20 238 Q22 225 24 238" fill="#66bb6a" opacity="0.7"/>
  <path d="M60 238 Q63 220 66 238" fill="#66bb6a" opacity="0.6"/>
  <path d="M120 238 Q122 228 124 238" fill="#66bb6a" opacity="0.7"/>
  <path d="M200 238 Q203 222 206 238" fill="#66bb6a" opacity="0.6"/>
  <path d="M300 238 Q302 226 304 238" fill="#66bb6a" opacity="0.7"/>
  <path d="M360 238 Q363 220 366 238" fill="#66bb6a" opacity="0.6"/>
  <!-- Posts -->
  <rect x="48" y="80" width="12" height="170" fill="url(#post)" rx="2"/>
  <rect x="48" y="76" width="12" height="8" fill="#607d8b" rx="2"/>
  <rect x="148" y="80" width="12" height="170" fill="url(#post)" rx="2"/>
  <rect x="148" y="76" width="12" height="8" fill="#607d8b" rx="2"/>
  <rect x="248" y="80" width="12" height="170" fill="url(#post)" rx="2"/>
  <rect x="248" y="76" width="12" height="8" fill="#607d8b" rx="2"/>
  <rect x="340" y="80" width="12" height="170" fill="url(#post)" rx="2"/>
  <rect x="340" y="76" width="12" height="8" fill="#607d8b" rx="2"/>
  <!-- Double bar horizontal wires (pairs) -->
  <g stroke="#455a64" stroke-width="2.5">
    <!-- Double bars at intervals -->
    <line x1="60" y1="95" x2="340" y2="95"/>
    <line x1="60" y1="100" x2="340" y2="100"/>
    <line x1="60" y1="125" x2="340" y2="125"/>
    <line x1="60" y1="130" x2="340" y2="130"/>
    <line x1="60" y1="155" x2="340" y2="155"/>
    <line x1="60" y1="160" x2="340" y2="160"/>
    <line x1="60" y1="185" x2="340" y2="185"/>
    <line x1="60" y1="190" x2="340" y2="190"/>
    <line x1="60" y1="215" x2="340" y2="215"/>
    <line x1="60" y1="220" x2="340" y2="220"/>
  </g>
  <!-- Vertical wires -->
  <g stroke="#546e7a" stroke-width="1.8">
    <line x1="75" y1="90" x2="75" y2="225"/>
    <line x1="90" y1="90" x2="90" y2="225"/>
    <line x1="105" y1="90" x2="105" y2="225"/>
    <line x1="120" y1="90" x2="120" y2="225"/>
    <line x1="135" y1="90" x2="135" y2="225"/>
    <line x1="165" y1="90" x2="165" y2="225"/>
    <line x1="180" y1="90" x2="180" y2="225"/>
    <line x1="195" y1="90" x2="195" y2="225"/>
    <line x1="210" y1="90" x2="210" y2="225"/>
    <line x1="225" y1="90" x2="225" y2="225"/>
    <line x1="265" y1="90" x2="265" y2="225"/>
    <line x1="280" y1="90" x2="280" y2="225"/>
    <line x1="295" y1="90" x2="295" y2="225"/>
    <line x1="310" y1="90" x2="310" y2="225"/>
    <line x1="325" y1="90" x2="325" y2="225"/>
  </g>
  <!-- Shadow -->
  <rect x="45" y="245" width="310" height="4" fill="#5d4037" opacity="0.3" rx="2"/>
</svg>
