<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#dcedc8"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a1887f"/>
      <stop offset="30%" stop-color="#8d6e63"/>
      <stop offset="60%" stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#8d6e63"/>
    </linearGradient>
    <linearGradient id="concrete" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9e9e9e"/>
      <stop offset="50%" stop-color="#bdbdbd"/>
      <stop offset="100%" stop-color="#9e9e9e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sky4)"/>
  <rect x="0" y="250" width="400" height="50" fill="#795548"/>
  <rect x="0" y="246" width="400" height="8" fill="#a5d6a7" rx="2"/>
  <!-- Concrete posts -->
  <rect x="40" y="75" width="20" height="178" fill="url(#concrete)" rx="2"/>
  <rect x="40" y="73" width="20" height="6" fill="#bdbdbd" rx="2"/>
  <!-- Post grooves -->
  <line x1="44" y1="80" x2="44" y2="248" stroke="#9e9e9e" stroke-width="1"/>
  <line x1="56" y1="80" x2="56" y2="248" stroke="#9e9e9e" stroke-width="1"/>
  <rect x="190" y="75" width="20" height="178" fill="url(#concrete)" rx="2"/>
  <rect x="190" y="73" width="20" height="6" fill="#bdbdbd" rx="2"/>
  <line x1="194" y1="80" x2="194" y2="248" stroke="#9e9e9e" stroke-width="1"/>
  <line x1="206" y1="80" x2="206" y2="248" stroke="#9e9e9e" stroke-width="1"/>
  <rect x="340" y="75" width="20" height="178" fill="url(#concrete)" rx="2"/>
  <rect x="340" y="73" width="20" height="6" fill="#bdbdbd" rx="2"/>
  <line x1="344" y1="80" x2="344" y2="248" stroke="#9e9e9e" stroke-width="1"/>
  <line x1="356" y1="80" x2="356" y2="248" stroke="#9e9e9e" stroke-width="1"/>
  <!-- Concrete bottom plate -->
  <rect x="60" y="218" width="130" height="34" fill="#bdbdbd" rx="1"/>
  <rect x="210" y="218" width="130" height="34" fill="#bdbdbd" rx="1"/>
  <!-- Wood grain texture on planks -->
  <g>
    <!-- Left panel planks -->
    <rect x="62" y="82" width="126" height="18" fill="#a1887f" rx="1"/>
    <line x1="80" y1="84" x2="80" y2="98" stroke="#8d6e63" stroke-width="0.5" opacity="0.5"/>
    <line x1="120" y1="85" x2="122" y2="98" stroke="#8d6e63" stroke-width="0.5" opacity="0.5"/>
    <rect x="62" y="102" width="126" height="18" fill="#8d6e63" rx="1"/>
    <rect x="62" y="122" width="126" height="18" fill="#a1887f" rx="1"/>
    <rect x="62" y="142" width="126" height="18" fill="#8d6e63" rx="1"/>
    <rect x="62" y="162" width="126" height="18" fill="#a1887f" rx="1"/>
    <rect x="62" y="182" width="126" height="18" fill="#8d6e63" rx="1"/>
    <rect x="62" y="202" width="126" height="14" fill="#a1887f" rx="1"/>
    <!-- Right panel planks -->
    <rect x="212" y="82" width="126" height="18" fill="#a1887f" rx="1"/>
    <rect x="212" y="102" width="126" height="18" fill="#8d6e63" rx="1"/>
    <rect x="212" y="122" width="126" height="18" fill="#a1887f" rx="1"/>
    <rect x="212" y="142" width="126" height="18" fill="#8d6e63" rx="1"/>
    <rect x="212" y="162" width="126" height="18" fill="#a1887f" rx="1"/>
    <rect x="212" y="182" width="126" height="18" fill="#8d6e63" rx="1"/>
    <rect x="212" y="202" width="126" height="14" fill="#a1887f" rx="1"/>
  </g>
</svg>
